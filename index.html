<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opus Communications | Development Mode</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'opus': '#004b8d',
                        'opus-dark': '#020617',
                        'opus-light': '#0ea5e9',
                    },
                    fontFamily: {
                        serif: ['"Instrument Serif"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 4s ease-in-out infinite',
                        'fade-in-up': 'fadeInUp 0.8s ease-out both',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                            '50%': { opacity: '0.7', transform: 'scale(1.1)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .mesh-bg {
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210, 100%, 20%, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(200, 100%, 20%, 0.15) 0px, transparent 50%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .delay-200 { animation-delay: 200ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-600 { animation-delay: 600ms; }
    </style>
</head>
<body class="mesh-bg text-white font-sans min-h-screen flex items-center justify-center p-6 overflow-hidden">

    <!-- Decorative Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-opus/10 blur-[100px] rounded-full pointer-events-none animate-pulse-glow"></div>

    <div class="max-w-4xl w-full text-center relative z-10">
        


        <!-- Development Badge -->
        <div class="animate-fade-in-up delay-200 mb-10">
            <div class="inline-flex items-center gap-3 px-6 py-2 rounded-full glass border border-opus/30 shadow-lg">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-opus-light opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-opus-light"></span>
                </span>
                <span class="text-xs md:text-sm font-semibold tracking-[0.3em] uppercase text-opus-light">Development Mode</span>
            </div>
        </div>

        <!-- Main Heading -->
        <h1 class="animate-fade-in-up delay-400 text-5xl md:text-7xl font-serif leading-tight mb-6 tracking-tight">
            We're building <br> 
            <span class="italic text-opus-light">something new.</span>
        </h1>

        <!-- Tagline -->
        <p class="animate-fade-in-up delay-600 text-lg md:text-2xl text-slate-400/80 font-light italic tracking-widest mb-16">
            ...thinking on a large scale
        </p>

        <!-- Footer / Contact Info -->
        <div class="animate-fade-in-up delay-600 pt-10 border-t border-white/5 max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="text-center md:text-left">
                <h3 class="text-[10px] uppercase tracking-[0.3em] text-slate-500 mb-3">Address</h3>
                <p class="text-xs md:text-sm text-slate-300 leading-relaxed font-light">
                    596/C Khilgaon, Road 2,<br> Dhaka 1219
                </p>
            </div>
            <div class="text-center">
                <h3 class="text-[10px] uppercase tracking-[0.3em] text-slate-500 mb-3">Email</h3>
                <p class="text-xs md:text-sm text-slate-300 font-light">
                    info@opusbd.com<br>opusbd1@gmail.com
                </p>
            </div>
            <div class="text-center md:text-right">
                <h3 class="text-[10px] uppercase tracking-[0.3em] text-slate-500 mb-3">Contact</h3>
                <p class="text-xs md:text-sm text-slate-300 font-light">
                    +880 1711 387708<br>+880 1911 484826
                </p>
            </div>
        </div>

        <!-- Web Link -->
        <div class="mt-12 animate-fade-in-up delay-600">
            <a href="https://www.opusbd.com" target="_blank" class="text-opus-light hover:text-white text-xs tracking-widest uppercase transition-colors duration-300">
                www.opusbd.com
            </a>
        </div>

    </div>

</body>
</html>
