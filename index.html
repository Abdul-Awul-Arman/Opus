<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opus Communications - Under Construction</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Instrument Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <!-- Configure Tailwind to use the custom font and animations -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'opus-blue': '#004b8d',
                        'opus-dark': '#041528',
                    },
                    fontFamily: {
                        serif: ['"Instrument Serif"', 'serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out both',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(0, 75, 141, 0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(0, 75, 141, 0.6), 0 0 40px rgba(0, 75, 141, 0.2)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
        
        /* Optional custom delays if tailwind's aren't enough */
        .delay-400 { animation-delay: 400ms; }
        .delay-600 { animation-delay: 600ms; }
        .delay-800 { animation-delay: 800ms; }
        .delay-1000 { animation-delay: 1000ms; }
    </style>
</head>
<!-- Using the dark blue color sampled directly from your logo background -->

<body
    class="bg-opus-dark text-white font-serif min-h-screen flex flex-col items-center justify-center p-6 sm:p-10 selection:bg-opus-blue selection:text-white">

    <!-- Main Content Container -->
    <div class="max-w-4xl w-full text-center flex flex-col items-center py-10">

        <!-- Brand Logo -->
        <div class="mb-12 mt-6 relative flex justify-center animate-fade-in-up hover:scale-[1.05] transition-transform duration-700 cursor-pointer group">
            <div class="animate-float relative z-10">
                <img src="logo.png" alt="Opus Communications" class="h-28 md:h-36 w-auto brightness-110 drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] group-hover:drop-shadow-[0_0_25px_rgba(56,189,248,0.2)] transition-all duration-700">
            </div>
            <!-- Glow effect behind logo -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-opus-blue/10 blur-[60px] rounded-full pointer-events-none group-hover:bg-opus-blue/20 transition-all duration-700"></div>
        </div>

        <!-- Animated Development Badge -->
        <div
            class="inline-flex items-center gap-3 px-5 py-2 rounded-full bg-white/5 border border-white/10 mb-8 shadow-lg backdrop-blur-md animate-fade-in-up delay-200 hover:bg-white/10 hover:border-white/20 transition-all duration-300 animate-glow cursor-default">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-sky-400 opacity-75"></span>
                <span
                    class="relative inline-flex rounded-full h-3 w-3 bg-sky-500 shadow-[0_0_8px_rgba(14,165,233,0.8)]"></span>
            </span>
            <span class="text-xs md:text-sm font-semibold tracking-[0.2em] uppercase text-sky-100">Development
                Mode</span>
        </div>

        <!-- Heading -->
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-10 leading-tight tracking-wider animate-fade-in-up delay-300">
            We're building <br class="hidden md:block" /> something <span
                class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-200 animate-pulse inline-block">new</span>.
        </h1>

        <!-- Tagline -->
        <div class="mb-16 relative px-4 animate-fade-in-up delay-500">
            <p class="text-opus-blue/60 italic text-2xl md:text-3xl tracking-[0.15em] font-light hover:text-opus-blue/90 transition-colors duration-500 cursor-default">
                ...thinking on a large scale
            </p>
        </div>

        <!-- Contact Section (From first image) -->
        <div class="w-full border-t border-white/10 pt-12 mt-4 animate-fade-in-up delay-700">
            <h2 class="text-3xl md:text-4xl text-white mb-10 tracking-widest">Get in touch with us</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10 text-left max-w-3xl mx-auto">

                <!-- Address Card -->
                <div
                    class="bg-white/[0.03] p-8 rounded-2xl border border-white/10 backdrop-blur-md hover:bg-white/[0.07] hover:border-opus-blue/30 hover:-translate-y-2 transition-all duration-300 shadow-xl group">
                    <h3 class="text-opus-blue text-2xl mb-4 tracking-widest italic group-hover:text-sky-400 transition-colors">Address</h3>
                    <p class="text-blue-100/90 text-xl md:text-2xl tracking-wide leading-relaxed">
                        596/C Khilgaon, Road 2,<br>
                        Dhaka 1219
                    </p>
                </div>

                <!-- Contact Card -->
                <div
                    class="bg-white/[0.03] p-8 rounded-2xl border border-white/10 backdrop-blur-md hover:bg-white/[0.07] hover:border-opus-blue/30 hover:-translate-y-2 transition-all duration-300 shadow-xl group">
                    <h3 class="text-opus-blue text-2xl mb-4 tracking-widest italic group-hover:text-sky-400 transition-colors">Contact</h3>

                    <div class="space-y-6">
                        <!-- Emails -->
                        <div>
                            <span class="block text-sm text-blue-200/50 tracking-[0.2em] uppercase mb-2 font-sans">Email
                                Us</span>
                            <a href="mailto:info@opusbd.com"
                                class="text-blue-100/90 hover:text-white transition-colors block text-xl md:text-2xl tracking-wider mb-1">info@opusbd.com</a>
                            <a href="mailto:opusbd1@gmail.com"
                                class="text-blue-100/90 hover:text-white transition-colors block text-xl md:text-2xl tracking-wider">opusbd1@gmail.com</a>
                        </div>

                        <!-- Hotlines -->
                        <div>
                            <span
                                class="block text-sm text-blue-200/50 tracking-[0.2em] uppercase mb-2 font-sans">Hotline</span>
                            <a href="tel:+8801711387708"
                                class="text-blue-100/90 hover:text-white transition-colors block text-xl md:text-2xl tracking-wider mb-1">+880
                                1711 387708</a>
                            <a href="tel:+8801911484826"
                                class="text-blue-100/90 hover:text-white transition-colors block text-xl md:text-2xl tracking-wider">+880
                                1911 484826</a>
                        </div>

                        <!-- Website -->
                        <div class="pt-2">
                            <span class="block text-sm text-opus-blue/50 tracking-[0.2em] uppercase mb-2 font-sans">Web
                                Site</span>
                            <a href="https://www.opusbd.com" target="_blank"
                                class="text-opus-blue hover:text-sky-400 transition-colors block text-xl md:text-2xl tracking-wider">www.opusbd.com</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>

</html>
